<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hakimi AI Cat</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
    background: #f2f2f2;
}

.header {
    background: #4CAF50;
    color: white;
    padding: 20px;
    font-size: 22px;
    text-align: center;
    font-weight: bold;
}

.container {
    padding: 20px;
    max-width: 500px;
    margin: auto;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.upload-btn {
    display: block;
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: #4CAF50;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

#preview {
    width: 100%;
    border-radius: 12px;
    margin-top: 15px;
    display: none;
}

.result-item {
    margin: 10px 0;
}

.bar {
    height: 10px;
    border-radius: 6px;
    background: #eee;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: #4CAF50;
    width: 0%;
    transition: 0.5s;
}

.top {
    color: #4CAF50;
    font-weight: bold;
}

.status {
    text-align: center;
    color: #666;
}
</style>
</head>

<body>

<div class="header">🐱 Hakimi Cat AI</div>

<div class="container">

<div class="card">
    <button class="upload-btn" onclick="fileInput.click()">📷 选择猫咪照片</button>
    <input type="file" id="file-input" accept="image/*" hidden>
    <img id="preview">
</div>

<div class="card">
    <div id="status" class="status">加载模型中...</div>
    <div id="results"></div>
</div>

</div>

<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/vddTpy6hw/";

let model;
const fileInput = document.getElementById("file-input");
const preview = document.getElementById("preview");
const results = document.getElementById("results");
const statusText = document.getElementById("status");

const labelMap = {
    "black_white_cat": "黑白猫 🐼",
    "calico_cat": "三花猫 🐱",
    "orange_cat": "橘猫 🟠",
    "tabby_cat": "虎斑猫 🐯"
};

async function init() {
    statusText.innerText = "⏳ AI模型加载中...";
    
    const modelURL = MODEL_URL + "model.json";
    const metadataURL = MODEL_URL + "metadata.json";
    
    model = await tmImage.load(modelURL, metadataURL);
    
    statusText.innerText = "✅ 上传图片开始识别";
    
    fileInput.addEventListener("change", handleUpload);
}

async function handleUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";

    await new Promise(r => preview.onload = r);

    predict(preview);
}

async function predict(img) {
    statusText.innerText = "🔍 AI识别中...";

    const predictions = await model.predict(img);

    predictions.sort((a, b) => b.probability - a.probability);

    results.innerHTML = "";

    predictions.forEach((p, i) => {
        const percent = (p.probability * 100).toFixed(1);
        const name = labelMap[p.className] || p.className;

        const item = document.createElement("div");
        item.className = "result-item";

        item.innerHTML = `
            <div class="${i === 0 ? 'top' : ''}">
                ${i === 0 ? '🏆 ' : ''}${name} (${percent}%)
            </div>
            <div class="bar">
                <div class="fill" style="width:${percent}%"></div>
            </div>
        `;

        results.appendChild(item);
    });

    if (predictions[0].probability < 0.6) {
        statusText.innerText = "⚠️ 结果不太确定，请换张图片";
    } else {
        statusText.innerText = "✅ 识别完成";
    }
}

init();
</script>

</body>
</html>
